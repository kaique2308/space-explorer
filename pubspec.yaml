name: space_explorer
description: Explore the universe with NASA's daily astronomy pictures and space data.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.1.0

  # State management
  provider: ^6.1.1

  # Firebase
  firebase_core: ^2.24.2
  firebase_analytics: ^10.7.4
  cloud_firestore: ^4.13.6

  # UI / Images
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

  # Utils
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
